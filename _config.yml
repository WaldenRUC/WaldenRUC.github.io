title: Walden's Blog
description: "A Jekyll Blog Theme For Hackers"
author:
  name: "Walden"
  email: "1335276371@qq.com"
  url: "waldenruc@github.io"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "Walden"
year : "2021"
